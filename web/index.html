<body>
  <style>
    body {
      background-color: #0D1B1E;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    /* Constrain the Flutter app to a mobile-like view on Desktop */
    flutter-view {
      max-width: 500px !important;
      max-height: 900px !important;
      margin: auto !important;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      position: relative;
      background-image: url("assets/assets/images/splash_bg.png");
      background-size: cover;
      background-position: center;
    }
    /* Overlay for the background image to match the dark theme */
    .splash-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to bottom, rgba(13, 27, 30, 0), rgba(13, 27, 30, 0.8), #0D1B1E);
      z-index: 1;
    }
    .logo-section, .bottom-section {
      z-index: 2;
    }
    .logo-section {
      text-align: center;
      margin-bottom: 100px;
    }
    .logo-main {
      font-family: 'Outfit', sans-serif;
      font-size: 64px;
      font-weight: bold;
      color: white;
      letter-spacing: -2px;
      margin: 0;
    }
    .logo-sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #4FBFA5;
      letter-spacing: 4px;
      margin: 5px 0 0 0;
    }
    .bottom-section {
      position: absolute;
      bottom: 80px;
      width: 80%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background-color: #4FBFA5;
      animation: progress-animation 2s ease-in-out forwards;
    }
    .loading-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      margin-top: 20px;
    }
    @keyframes progress-animation {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
</head>
</body>
  <div id="splash-screen" class="splash-container">
    <div class="bottom-section">
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('load', function() {
      var splash = document.getElementById('splash-screen');
      
      // Fast removal fallback (5 seconds)
      var fallbackTimeout = setTimeout(function() {
        if (splash) {
          splash.style.transition = 'opacity 0.1s ease-out';
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 100);
        }
      }, 5000);

      window._flutter_onEntrypointLoaded = function(engineInitializer) {
        engineInitializer.initializeEngine().then(function(appRunner) {
          appRunner.runApp().then(function() {
            clearTimeout(fallbackTimeout);
            // Ultra-fast removal (< 100ms)
            if (splash) {
              splash.style.transition = 'opacity 0.08s ease-out';
              splash.style.opacity = '0';
              setTimeout(function() { splash.remove(); }, 80);
            }
          });
        });
      };
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
